; PlatformIO Configuration - AntiCant Shooting Assistant
; Board: Seeed XIAO BLE nRF52840 Sense

[env:xiaoblesense]
platform = nordicnrf52
board = xiaoblesense_adafruit
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit SSD1680@^1.0.4
    adafruit/Adafruit BusIO@^1.16.1

build_flags =
    -DARDUINO_SEEED_XIAO_NRF52840_SENSE
    -DCFG_DEBUG=0
    -Os

; Upload settings
upload_protocol = nrfutil
upload_speed = 115200
