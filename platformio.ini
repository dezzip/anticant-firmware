; PlatformIO Configuration - AntiCant Shooting Assistant
; Board: Seeed Studio XIAO BLE Sense nRF52840

[env:xiaonrf52840sense]
platform = nordicnrf52
board = seeed_xiao_nrf52840_sense
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit EPD@^4.6.9
    adafruit/Adafruit BusIO@^1.16.1
    ArduinoBLE@^1.3.6
    https://github.com/Seeed-Studio/Seeed_Arduino_LSM6DS3.git

build_flags =
    -DARDUINO_XIAO_NRF52840_SENSE
    -Os

; Upload settings
upload_speed = 115200
